<div class="login-container">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card login-card">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="bi bi-train-front display-4 text-primary mb-3"></i>
              <h2 class="fw-bold">Welcome Back</h2>
              <p class="text-muted">Sign in to your account to continue</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                  </span>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    formControlName="email"
                    placeholder="Enter your email"
                    [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                  >
                </div>
                <div class="invalid-feedback d-block" *ngIf="getErrorMessage('email')">
                  {{ getErrorMessage('email') }}
                </div>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input
                    [type]="showPassword ? 'text' : 'password'"
                    class="form-control"
                    id="password"
                    formControlName="password"
                    placeholder="Enter your password"
                    [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                  >
                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    (click)="togglePasswordVisibility()"
                  >
                    <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                  </button>
                </div>
                <div class="invalid-feedback d-block" *ngIf="getErrorMessage('password')">
                  {{ getErrorMessage('password') }}
                </div>
              </div>

              <div class="alert alert-danger" *ngIf="errorMessage">
                <i class="bi bi-exclamation-triangle me-2"></i>
                {{ errorMessage }}
              </div>

              <button
                type="submit"
                class="btn btn-primary w-100 mb-3"
                [disabled]="isLoading || loginForm.invalid"
              >
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isLoading ? 'Signing In...' : 'Sign In' }}
              </button>

              <div class="text-center">
                <p class="mb-0">
                  Don't have an account?
                  <a routerLink="/register" class="text-primary fw-semibold">Register here</a>
                </p>
              </div>
            </form>
          </div>
        </div>

        <div class="text-center mt-4">
          <a routerLink="/" class="text-white text-decoration-none">
            <i class="bi bi-arrow-left me-2"></i>Back to Home
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
